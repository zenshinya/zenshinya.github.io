<!DOCTYPE html>
<html lang="en">
<head>
	<title>Color</title>
	<meta charset="utf-8">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
	<script src="lib/index.js"></script>
	<link rel="stylesheet" href="css/index.css">
</head>
<body>
	<div class="toolbox">
		<div class="tool" style="background-color:black; width:50px; height:50px;" onclick="selectColor(0)"></div>
		<div class="tool" style="background-color:red; width:50px; height:50px;" onclick="selectColor(1)"></div>
		<div class="tool" style="background-color:green; width:50px; height:50px;" onclick="selectColor(2)"></div>
		<div class="tool" style="background-color:blue; width:50px; height:50px;" onclick="selectColor(3)"></div>
	</div>
	<br />
	<button onclick="resetGame()">Reset Game</button>
	<br /><br />
	<div>Clicks left: <span id="currentCount"></span></div>
	<br />
	<div id="winText" style="color: red;"></span></div>
	<div id="playground" class="playground">
	</div>
</body>
</html>
