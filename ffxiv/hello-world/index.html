<!DOCTYPE html>
<html lang="en">

<head>
	<title>Hello World | Alphascape Savage | FFXIV</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
	<link rel="stylesheet" type="text/css" href="index.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
	<script src="lib/index.js"></script>
	<script src="lib/jquery.localize.min.js"></script>
</head>

<body>
	<div class="container page-container">
		<div class="header text-center">
			<h1 data-localize="LABEL_HELLO_WORLD"></h1>
		</div>
		<div class="navigation row">
			<div class="col menu-bar">
				<div class="row">
					<div class="dropdown menu-dropdown">
						<button class="btn dropdown-toggle" type="button" data-toggle="dropdown" data-localize="LABEL_HW1">
						</button>
						<div class="dropdown-menu">
							<a class="dropdown-item menu-item" data-localize="LABEL_HW_1313" href="?mode=HW1-1313"></a>
							<a class="dropdown-item menu-item" data-localize="LABEL_HW_134" href="?mode=HW1-134"></a>
							<a class="dropdown-item menu-item" data-localize="LABEL_HW_1322" href="?mode=HW1-1322"></a>
							<a class="dropdown-item menu-item" data-localize="LABEL_HW_1223" href="?mode=HW1-1223"></a>
						</div>
					</div>
					<div class="dropdown menu-dropdown">
						<button class="btn dropdown-toggle" type="button" data-toggle="dropdown" data-localize="LABEL_HW2">
							Hello World 2
						</button>
						<div class="dropdown-menu">
							<a class="dropdown-item menu-item" data-localize="LABEL_HW_1313" href="?mode=HW2-1313"></a>
							<a class="dropdown-item menu-item" data-localize="LABEL_HW_134" href="?mode=HW2-134"></a>
							<a class="dropdown-item menu-item" data-localize="LABEL_HW_1322" href="?mode=HW2-1322"></a>
							<a class="dropdown-item menu-item" data-localize="LABEL_HW_1223" href="?mode=HW2-1223"></a>
						</div>
					</div>
				</div>
			</div>
			<div class="col language-bar">
				<span onclick="chooseLanguage('en')">
					English
				</span>
				<span onclick="chooseLanguage('jp')">
					日本語
				</span>
			</div>
		</div>
		<div class="row mode-bar">
			<span data-localize="LABEL_CURRENT_MODE"></span>
			<span id="current-mode-hw-display" data-localize="LABEL_HW1"></span>
			<span>></span>
			<span id="current-mode-type-display" data-localize="LABEL_HW_1313"></span>
		</div>
		<div class="row">
			<div class="hw-canvas-container col">
				<canvas id="hello-world" class="hw-canvas" width="600" height="600" data-localize="LABEL_CANVAS_ERROR">
				</canvas>
			</div>
		</div>
	</div>
</body>

</html>
