<!DOCTYPE html>
<html lang="en">
<head>
	<title>Nechronica</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
	<script src="lib/jquery.localize.min.js"></script>
	<script src="lib/index.js"></script>
	<link rel="stylesheet" href="css/index.css">
</head>
<body>

<div class="header text-center">
	<div data-localize="MSG_TITLE_SUBTITLE_PREFIX"></div>
	<div class="title" data-localize="MSG_TITLE_NECHRONICA">Nechronica</div>
	<div data-localize="MSG_TITLE_SUBTITLE_POSTFIX">~The Long Long Sequel~</div>
</div>

<div class="container">
    <nav class="navbar navbar-default" role="navigation">
      <div class="navbar-header">
        <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".navbar-ex1-collapse">
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>
      </div>
      <div class="collapse navbar-collapse navbar-ex1-collapse">
        <ul class="nav navbar-nav" id="navTabs">
          <li class="home active">
			<a href="#home" aria-controls="home" role="tab" data-toggle="tab">
				<span data-localize="MSG_NAVBAR_HOME">Home</span>
			</a>
		  </li>
          <li class="doll-creation">
			<a href="#doll-creation" aria-controls="doll-creation" role="tab" data-toggle="tab">
				<span data-localize="MSG_NAVBAR_DOLL_CREATION">Doll Creation</span>
			</a>
		  </li>
          <li class="dropdown">
            <a href="#" class="dropdown-toggle" data-toggle="dropdown"><span id="language-tab"></span><b class="caret"></b></a>
            <ul class="dropdown-menu">
              <li><a href="#"><img class="flag" src="image/en.png" name="en"/><span data-localize="MSG_LANGUAGE_ENGLISH">English</span></a></li>
              <li><a href="#"><img class="flag" src="image/jp.png" name="jp"/><span data-localize="MSG_LANGUAGE_JAPANESE">Japanese</span></a></li>
            </ul>
          </li>
        </ul>
      </div>
    </nav>
	<!-- Tab panes -->
	<div class="tab-content clearfix">
		<!-- Home -->
		<div role="tabpanel" class="tab-pane active" id="home">
			<div class="screen-home individual-page">
				<u><h3 data-localize="MSG_COMMON_REFERENCES">References</h3></u>
				<div><a href="http://www.nechronica.com/top.html" target="_blank">http://www.nechronica.com/top.html</a></div>
				<div><a href="https://tlwiki.org/?title=Nechronica" target="_blank">https://tlwiki.org/?title=Nechronica</a></div>
			</div>
		</div>
		<!-- Doll Creation -->
		<div role="tabpanel" class="tab-pane" id="doll-creation">
			<div class="screen-doll-creation individual-page-big">
				<div class="col-md-offset-2 col-md-4 col-sm-6 individual-section">
					<div class="clearfix">
						<div class="common-label col-xs-4" data-localize="MSG_COMMON_DOLL_NAME">Doll's Name:</div>
						<input class="common-text-bar col-xs-8" type="text" maxlength="20">
					</div>
					<div class="clearfix">
						<div class="common-label col-xs-4" data-localize="MSG_COMMON_PLAYER_NAME">Player's Name:</div>
						<input class="common-text-bar col-xs-8" type="text" maxlength="20">
					</div>
					<div class="clearfix">
						<div class="common-label col-xs-4" data-localize="MSG_COMMON_AGE">Age (8-17):</div>
						<input class="common-text-bar col-xs-2" type="number" min="8" max="17" id="age-field">
						<div class="common-dice col-xs-6">
							<button class="dice-roll-button" type="button" onclick="rollDice10('age-dice', 'age-field', 7)" data-localize="MSG_ROLL_DICE_AGE">d10 + 7</button>
							<div class="dice-d10" id="age-dice"></div>
						</div>
					</div>
				</div>
				<div class="col-md-offset-2 col-md-4 col-sm-6 individual-section">
					<span></span>
				</div>
			</div>
		</div>
	</div>
</div>

</body>
</html>
